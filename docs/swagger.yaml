components:
  schemas:
    sample.CreateSampleRequest:
      properties:
        created_by:
          type: integer
        description:
          type: string
        name:
          type: string
      required:
      - name
      type: object
    sample.ListSamplesResponse:
      properties:
        data:
          items:
            $ref: '#/components/schemas/sample.Sample'
          type: array
          uniqueItems: false
        limit:
          type: integer
        page:
          type: integer
        total:
          type: integer
      type: object
    sample.PatchSampleRequest:
      properties:
        description:
          type: string
        name:
          type: string
        updated_by:
          type: integer
      type: object
    sample.Sample:
      properties:
        created_at:
          type: string
        created_by:
          type: integer
        description:
          type: string
        id:
          type: integer
        name:
          type: string
        updated_at:
          type: string
        updated_by:
          type: integer
      type: object
    sample.UpdateSampleRequest:
      properties:
        description:
          type: string
        name:
          type: string
        updated_by:
          type: integer
      required:
      - name
      type: object
  securitySchemes:
    BearerAuth:
      description: Type "Bearer" followed by a space and the JWT token.
      in: header
      name: Authorization
      type: apiKey
externalDocs:
  description: ""
  url: ""
info:
  contact:
    email: support@my-gift.local
    name: API Support
  description: RESTful API for the My Gift service.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: My Gift API
  version: "1.0"
openapi: 3.1.0
paths:
  /api/v1/samples:
    get:
      description: Returns a paginated list of samples
      parameters:
      - description: 'Page number (default: 1)'
        in: query
        name: page
        schema:
          type: integer
      - description: 'Items per page (default: 10)'
        in: query
        name: limit
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sample.ListSamplesResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal Server Error
      summary: List all samples
      tags:
      - samples
    post:
      description: Creates a new sample resource
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/sample.CreateSampleRequest'
                description: Sample payload
                summary: request
        description: Sample payload
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sample.Sample'
          description: Created
        "400":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal Server Error
      summary: Create a sample
      tags:
      - samples
  /api/v1/samples/{id}:
    delete:
      description: Deletes a sample by ID
      parameters:
      - description: Sample ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "204":
          description: No Content
        "404":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal Server Error
      summary: Delete a sample
      tags:
      - samples
    get:
      description: Returns a single sample by ID
      parameters:
      - description: Sample ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sample.Sample'
          description: OK
        "404":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal Server Error
      summary: Get a sample
      tags:
      - samples
    patch:
      description: Updates only provided fields of a sample by ID
      parameters:
      - description: Sample ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/sample.PatchSampleRequest'
                description: Sample patch payload
                summary: request
        description: Sample patch payload
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sample.Sample'
          description: OK
        "400":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal Server Error
      summary: Partially update a sample
      tags:
      - samples
    put:
      description: Replaces all fields of a sample by ID
      parameters:
      - description: Sample ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/sample.UpdateSampleRequest'
                description: Sample payload
                summary: request
        description: Sample payload
        required: true
      responses:
        "204":
          description: No Content
        "400":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal Server Error
      summary: Update a sample
      tags:
      - samples
servers:
- description: Local development server
  url: http://localhost:8080
